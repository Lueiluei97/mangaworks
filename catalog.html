<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>目录 | Lei's Manga Works</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 40px 30px;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 100%;
    }
    .catalog-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }
    .catalog-card {
      display: flex;
      justify-content: center;
      padding: 15px;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .preview-box {
      width: 100%;
      max-width: 200px;
      aspect-ratio: 3 / 2;
      border: 1px solid rgba(255,255,255,0.15);
      overflow: hidden;
      background: #000;
      transition: border-color 0.3s;
    }
    .catalog-card:hover .preview-box {
      border-color: rgba(255,255,255,0.4);
    }
    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .plain-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .plain-item {
      display: block;
      padding: 14px 20px;
      text-decoration: none;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      transition: all 0.3s ease;
      border: none;
      text-align: center;
    }
    .plain-item:hover {
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>
  <div class="container">
    <div class="catalog-grid">
      <a href="badminton.html" class="catalog-card">
        <div class="preview-box">
          <img src="badminton_preview.JPG" alt="羽毛球">
        </div>
      </a>
      <a href="ami.html" class="catalog-card">
        <div class="preview-box">
          <img src="ami_preview.JPG" alt="阿米">
        </div>
      </a>
      <a href="princess.html" class="catalog-card">
        <div class="preview-box">
          <img src="princess_preview.JPG" alt="公主奇遇记">
        </div>
      </a>
    </div>

    <div class="plain-list">
      <a href="writings.html" class="plain-item">一些文字</a>
      <a href="diary.html" class="plain-item">日记</a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d');
    let width, height;
    const drops = [];
    const maxDrops = 80;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Drop {
      constructor() {
        this.reset(true);
      }
      reset(initial = false) {
        this.x = Math.random() * (width + 200) - 100;
        this.y = initial ? Math.random() * height : Math.random() * -50;
        this.len = Math.random() * 12 + 6;
        this.speed = Math.random() * 2 + 1.5;
        this.opacity = Math.random() * 0.15 + 0.04;
        this.drift = Math.random() * 0.4 + 0.1;
        this.width = Math.random() * 0.4 + 0.2;
      }
      update() {
        this.y += this.speed;
        this.x += this.drift;
        if (this.y > height + 20) {
          this.reset();
        }
      }
      draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.drift * 0.5, this.y + this.len);
        ctx.strokeStyle = `rgba(180,195,215,${this.opacity})`;
        ctx.lineWidth = this.width;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    for (let i = 0; i < maxDrops; i++) {
      drops.push(new Drop());
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      drops.forEach(drop => {
        drop.update();
        drop.draw();
      });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
