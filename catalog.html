<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>目录 | Lei's Manga Works</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 40px 30px;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 500px;
      width: 100%;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 300;
      margin-bottom: 50px;
      text-align: center;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.5);
    }
    .catalog-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .catalog-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      text-decoration: none;
      color: rgba(255,255,255,0.6);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      transition: all 0.3s ease;
      border: none;
    }
    .catalog-item + .catalog-item {
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .catalog-item:hover {
      color: rgba(255,255,255,0.95);
      padding-left: 8px;
    }
    .item-arrow {
      font-size: 1rem;
      color: rgba(255,255,255,0.15);
      transition: all 0.3s ease;
    }
    .catalog-item:hover .item-arrow {
      color: rgba(255,255,255,0.5);
      transform: translateX(3px);
    }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>
  <div class="container">
    <h1>目 录</h1>
    <div class="catalog-list">
      <a href="badminton.html" class="catalog-item">
        <span>羽毛球</span>
        <span class="item-arrow">→</span>
      </a>
      <a href="ami.html" class="catalog-item">
        <span>阿米</span>
        <span class="item-arrow">→</span>
      </a>
      <a href="princess.html" class="catalog-item">
        <span>公主奇遇记</span>
        <span class="item-arrow">→</span>
      </a>
      <a href="writings.html" class="catalog-item">
        <span>一些文字</span>
        <span class="item-arrow">→</span>
      </a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d');
    let width, height;
    const drops = [];
    const maxDrops = 80;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Drop {
      constructor() {
        this.reset(true);
      }
      reset(initial = false) {
        this.x = Math.random() * (width + 200) - 100;
        this.y = initial ? Math.random() * height : Math.random() * -50;
        this.len = Math.random() * 12 + 6;
        this.speed = Math.random() * 2 + 1.5;
        this.opacity = Math.random() * 0.15 + 0.04;
        this.drift = Math.random() * 0.4 + 0.1;
        this.width = Math.random() * 0.4 + 0.2;
      }
      update() {
        this.y += this.speed;
        this.x += this.drift;
        if (this.y > height + 20) {
          this.reset();
        }
      }
      draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.drift * 0.5, this.y + this.len);
        ctx.strokeStyle = `rgba(180,195,215,${this.opacity})`;
        ctx.lineWidth = this.width;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    for (let i = 0; i < maxDrops; i++) {
      drops.push(new Drop());
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      drops.forEach(drop => {
        drop.update();
        drop.draw();
      });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
