<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>目录 | Lei's Manga Works</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      position: relative;
      padding: 80px 16px 60px;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    .catalog-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 50px;
    }
    .catalog-card {
      display: block;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .preview-box {
      width: 100%;
      aspect-ratio: 3 / 2;
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
      background: #000;
      transition: border-color 0.3s, transform 0.3s;
    }
    .catalog-card:hover .preview-box {
      border-color: rgba(255,255,255,0.35);
      transform: scale(1.02);
    }
    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .plain-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 50px;
    }
    .plain-item {
      display: block;
      padding: 14px 0;
      text-decoration: none;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      transition: all 0.3s ease;
      border: none;
      position: relative;
    }
    .plain-item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 1px;
      background: rgba(255,255,255,0.3);
      transition: width 0.3s ease;
    }
    .plain-item:hover {
      color: rgba(255,255,255,0.9);
      padding-left: 24px;
    }
    .plain-item:hover::before {
      width: 16px;
    }
    /* 欢迎区域 */
    .welcome-section {
      padding: 8px 4px;
    }
    .welcome-text {
      text-align: left;
      color: rgba(255,255,255,0.75);
      font-size: 0.95rem;
      line-height: 1.8;
      letter-spacing: 0.05em;
    }
    .welcome-signature {
      text-align: right;
      color: rgba(255,255,255,0.45);
      font-size: 0.85rem;
      margin-top: 14px;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
    <canvas id="rain"></canvas>
  <div class="container">
    <div class="catalog-grid">
      <a href="ami.html" class="catalog-card">
        <div class="preview-box">
          <img src="ami_preview.jpg" alt="阿米">
        </div>
      </a>
      <a href="badminton.html" class="catalog-card">
        <div class="preview-box">
          <img src="badminton_preview.png" alt="羽毛球">
        </div>
      </a>
      <a href="princess.html" class="catalog-card">
        <div class="preview-box">
          <img src="princess_preview.PNG" alt="公主奇遇记">
        </div>
      </a>
      <a href="misc.html" class="catalog-card">
        <div class="preview-box">
          <img src="misc_preview.JPG" alt="杂">
        </div>
      </a>
      <a href="neveragain.html" class="catalog-card">
        <div class="preview-box">
          <img src="neveragain_preview.JPG" alt="不画了">
        </div>
      </a>
    </div>

    <div class="plain-list">
      <a href="writings.html" class="plain-item">一些文字</a>
      <a href="diary.html" class="plain-item">日记</a>
    </div>

    <!-- 欢迎语 -->
    <div class="welcome-section">
      <p class="welcome-text">欢迎！由于挖矿漫画节的契机我在AI的帮助下制作了这个网页，祝你阅读愉快！</p>
      <p class="welcome-signature">——新名字</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d');
    let w, h;
    const drops = [];
    const maxDrops = 80;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Drop {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = Math.random() * (w + 200) - 100;
        this.y = initial ? Math.random() * h : Math.random() * -50;
        this.len = Math.random() * 12 + 6;
        this.speed = Math.random() * 2 + 1.5;
        this.opacity = Math.random() * 0.15 + 0.04;
        this.drift = Math.random() * 0.4 + 0.1;
        this.width = Math.random() * 0.4 + 0.2;
      }
      update() {
        this.y += this.speed;
        this.x += this.drift;
        if (this.y > h + 20) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.drift * 0.5, this.y + this.len);
        ctx.strokeStyle = `rgba(180,195,215,${this.opacity})`;
        ctx.lineWidth = this.width;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    for (let i = 0; i < maxDrops; i++) drops.push(new Drop());

    function animate() {
      ctx.clearRect(0, 0, w, h);
      drops.forEach(d => { d.update(); d.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
