<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公主奇遇记 | Lei's Manga Works</title>

  <!-- 预加载第一张插图，确保最先出现 -->
  <link rel="preload" as="image" href="princess/princess_1.jpg" type="image/jpeg">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      padding: 90px 16px 70px;
      overflow-x: hidden;
    }

    .content {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      contain: layout style paint;
    }

    .back {
      position: fixed;
      top: 24px;
      left: 24px;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      font-size: 1.4rem;
      z-index: 10;
      transform: translateZ(0);
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 10px;
      color: rgba(255,255,255,0.6);
    }

    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.3);
      margin-bottom: 42px;
      letter-spacing: 0.05em;
    }

    .preface {
      max-width: 600px;
      margin: 0 auto 45px;
      line-height: 1.8;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      text-align: left;
    }

    .gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .gallery img {
      width: 100%;
      max-width: 700px;
      height: auto;
      display: block;
      border-radius: 2px;
      background: #222;
      aspect-ratio: 1600 / 1140;
      opacity: 0;
      transition: opacity .25s linear;
      content-visibility: auto;
      contain-intrinsic-size: 700px 499px;
      transform: translateZ(0);
      will-change: opacity;
    }

    .gallery img.loaded,
    .gallery img:first-child {
      opacity: 1;
    }

    .desc {
      max-width: 600px;
      margin: 55px auto 0;
      line-height: 1.85;
      color: rgba(255,255,255,0.42);
      font-size: 0.9rem;
      text-align: left;
    }

    @media (max-width: 768px) {
      body {
        padding: 80px 12px 60px;
      }
      .back {
        top: 18px;
        left: 18px;
      }
      .preface,
      .desc {
        font-size: 0.88rem;
      }
    }
  </style>
</head>

<body>
  <a href="index.html" class="back">←</a>

  <div class="content">
    <h1>公主奇遇记</h1>
    <p class="subtitle">The Princess' Adventure</p>

    <p class="preface">
      这是我在2025年创作的插画，源于洗澡时的灵光一闪。这里只画出了一部分，名为《鸭子听雷》，公主在雨中跌跌撞撞，落魄间遇见了一群鸭子。
    </p>

    <div class="gallery">
      <!-- 第一张：立即加载，最高优先级 -->
      <img
        src="princess/princess_1.webp"
        alt="插图1"
        width="700"
        height="499"
        loading="eager"
      >

      <!-- 后面懒加载，限制并发 -->
      <img data-src="princess/princess_2.webp" alt="插图2" width="700" height="499">
      <img data-src="princess/princess_3.webp" alt="插图3" width="700" height="499">
      <img data-src="princess/princess_4.webp" alt="插图4" width="700" height="499">
      <img data-src="princess/princess_5.webp" alt="插图5" width="700" height="499">
      <img data-src="princess/princess_6.webp" alt="插图6" width="700" height="499">
    </div>

    <p class="desc">
      “鸭子听雷”是在描述鸭子和鹅会出现的一种自然反应，当它们遭遇雷雨时会集体抬头朝向雨的方向一动不动，仿佛站在雨中听雷声。其实是它们的羽毛上有一层油脂，朝向雨的方向能让雨水最快从身上滑过，一动不动是为了减少热量消耗。现在“鸭子听雷”变成一句俗语，人听不懂另一个人说话就像是鸭子听不懂雷声。
    </p>
  </div>

  <script>
    const images = document.querySelectorAll('img[data-src]');

    // ===== 3.0 加载系统 =====
    const queue = [];
    let active = 0;
    const MAX_CONCURRENT = 2;

    // 加载单张图
    function load(img) {
      return new Promise((resolve) => {
        const src = img.dataset.src;
        if (!src) return resolve();

        img.src = src;

        const done = () => {
          img.classList.add('loaded');
          resolve();
        };

        if (img.decode) {
          img.decode().then(done).catch(() => img.onload = done);
        } else {
          img.onload = done;
        }
      });
    }

    // 队列处理
    function next() {
      if (active >= MAX_CONCURRENT || queue.length === 0) return;

      while (active < MAX_CONCURRENT && queue.length > 0) {
        const img = queue.shift();
        active++;

        load(img).finally(() => {
          active--;
          next();
        });
      }
    }

    // IntersectionObserver
    const observer = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (entry.isIntersecting) {
          const img = entry.target;

          if (!queue.includes(img)) {
            queue.push(img);
            next();
          }

          observer.unobserve(img);
        }
      }
    }, {
      rootMargin: '600px 0px',
      threshold: 0.01
    });

    images.forEach(img => observer.observe(img));
  </script>
</body>
</html>
