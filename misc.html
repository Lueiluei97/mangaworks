<!DOCTYPE html>

<html lang="zh-CN">

<head>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>杂 | Lei's Manga Works</title>

  <style>

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;

    }

    body {

      font-family:

        -apple-system,

        BlinkMacSystemFont,

        "Segoe UI",

        Roboto,

        "Helvetica Neue",

        Arial,

        sans-serif;

      background: #1a1a1a;

      color: #fff;

      min-height: 100vh;

      padding: 90px 16px 70px;

      overflow-x: hidden;

    }

    .content {

      max-width: 800px;

      margin: 0 auto;

      text-align: center;

    }

    .back {

      position: fixed;

      top: 24px;

      left: 24px;

      color: rgba(255,255,255,0.35);

      text-decoration: none;

      font-size: 1.4rem;

      z-index: 10;

    }

    h1 {

      font-size: 1.3rem;

      font-weight: 300;

      letter-spacing: 0.15em;

      margin-bottom: 10px;

      color: rgba(255,255,255,0.6);

    }

    .subtitle {

      font-size: 0.85rem;

      color: rgba(255,255,255,0.3);

      margin-bottom: 42px;

      letter-spacing: 0.05em;

    }

    .gallery {

      display: flex;

      flex-direction: column;

      align-items: center;

      gap: 18px;

    }

    .gallery img {

      width: 100%;

      max-width: 700px;

      height: auto;

      display: block;

      border-radius: 2px;

      background: #222;

    }

    .desc {

      max-width: 600px;

      margin: 55px auto 0;

      line-height: 1.85;

      color: rgba(255,255,255,0.42);

      font-size: 0.9rem;

      text-align: left;

    }

    @media (max-width: 768px) {

      body {

        padding: 80px 12px 60px;

      }

      .back {

        top: 18px;

        left: 18px;

      }

    }

  </style>

</head>

<body>

  <a href="index.html" class="back">←</a>

  <div class="content">

    <h1>杂</h1>

    <p class="subtitle">miscellaneous</p>

    <div class="gallery">

      <!-- 第一张首屏加载 -->

      <img

        src="misc/misc_firstone.jpg"

        alt="杂项1"

        loading="eager"

        decoding="async"

      >

      <!-- 后续懒加载 -->

      <img data-src="misc/misc_1.jpeg" alt="杂项2">

      <img data-src="misc/misc_2.jpeg" alt="杂项3">

      <img data-src="misc/misc_3.jpeg" alt="杂项4">

      <img data-src="misc/misc_4.webp" alt="杂项5">

      <img data-src="misc/misc_5.jpg" alt="杂项6">

      <img data-src="misc/misc_6.jpg" alt="杂项7">

    </div>

    <p class="desc">

      一些零散的涂鸦和随笔。

    </p>

  </div>

  <script>

    const lazyImages = document.querySelectorAll('img[data-src]');

    const observer = new IntersectionObserver((entries, obs) => {

      entries.forEach(entry => {

        if (entry.isIntersecting) {

          const img = entry.target;

          img.src = img.dataset.src;

          img.loading = "lazy";

          img.decoding = "async";

          obs.unobserve(img);

        }

      });

    }, {

      rootMargin: '0px',

      threshold: 0

    });

    lazyImages.forEach(img => observer.observe(img));

  </script>

</body>

</html>
