<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿米 | Lei's Manga Works</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      position: relative;
      padding: 100px 20px 80px;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .content {
      position: relative;
      z-index: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      text-align: center;
    }
    .back {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 2;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      font-size: 1.5rem;
      transition: color 0.3s;
    }
    .back:hover { color: rgba(255,255,255,0.8); }
    h1 {
      font-size: 1.3rem;
      font-weight: 300;
      margin-bottom: 10px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.6);
    }
    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.3);
      margin-bottom: 50px;
      letter-spacing: 0.05em;
    }
    .gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .gallery img {
      width: 100%;
      max-width: 700px;
      display: block;
      border-radius: 2px;
    }
    .desc {
      max-width: 600px;
      margin: 60px auto 0;
      line-height: 1.8;
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
      text-align: left;
    }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>
  <a href="index.html" class="back">←</a>

  <div class="content">
    <h1>《阿米》</h1>
    <p class="subtitle">ami</p>

    <div class="gallery">
      <img src="ami/ami_1.jpg" alt="漫画页面 1">
      <img src="ami/ami_2.jpg" alt="漫画页面 2">
      <img src="ami/ami_3.jpg" alt="漫画页面 3">
      <img src="ami/ami_4.JPG" alt="漫画页面 4">
      <img src="ami/ami_5.JPG" alt="漫画页面 5">
      <img src="ami/ami_6.JPG" alt="漫画页面 6">
      <img src="ami/ami_7.JPG" alt="漫画页面 7">
      <img src="ami/ami_8.JPG" alt="漫画页面 8">
      <img src="ami/ami_9.JPG" alt="漫画页面 9">
      <img src="ami/ami_10.JPG" alt="漫画页面 10">
      <img src="ami/ami_10.JPG" alt="漫画页面 11">
      <img src="ami/ami_10.JPG" alt="漫画页面 12">
      <img src="ami/ami_10.JPG" alt="漫画页面 13">
      <img src="ami/ami_10.JPG" alt="漫画页面 14">
    </div>

    <p class="desc">
      这篇漫画画于2025年的下半年，只画了一半，在两个月前报名参加挖矿漫画节后又再翻出来把它画完。
去年我也感觉自己陷入比较抑郁的状况之中，当时画的时候脑海里创造出了一个朋友的形象（Ami在法语里有朋友的意思），相当于是主角在给一个虚幻的朋友写的信，这个朋友能关注着她给她提供力量，她也有自己所不理解的东西。
虽然没有办法立马就让读完漫画的朋友高兴起来，但还是希望所有人都有从消沉中抬起头望天空的心情！
感谢你的阅读。
    </p>
  </div>

  <script>
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d');
    let w, h;
    const drops = [];
    const maxDrops = 80;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Drop {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = Math.random() * (w + 200) - 100;
        this.y = initial ? Math.random() * h : Math.random() * -50;
        this.len = Math.random() * 12 + 6;
        this.speed = Math.random() * 2 + 1.5;
        this.opacity = Math.random() * 0.15 + 0.04;
        this.drift = Math.random() * 0.4 + 0.1;
        this.width = Math.random() * 0.4 + 0.2;
      }
      update() {
        this.y += this.speed;
        this.x += this.drift;
        if (this.y > h + 20) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.drift * 0.5, this.y + this.len);
        ctx.strokeStyle = `rgba(180,195,215,${this.opacity})`;
        ctx.lineWidth = this.width;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    for (let i = 0; i < maxDrops; i++) drops.push(new Drop());

    function animate() {
      ctx.clearRect(0, 0, w, h);
      drops.forEach(d => { d.update(); d.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
