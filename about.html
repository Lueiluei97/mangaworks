<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于 | Lei's Manga Works</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      position: relative;
      padding: 100px 20px 80px;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .content {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      text-align: center;
    }
    .back {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 2;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      font-size: 1.5rem;
      transition: color 0.3s;
    }
    .back:hover { color: rgba(255,255,255,0.8); }
    h1 {
      font-size: 1.3rem;
      font-weight: 300;
      margin-bottom: 10px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.6);
    }
    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.3);
      margin-bottom: 50px;
      letter-spacing: 0.05em;
    }
    .intro-text {
      line-height: 1.8;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      text-align: left;
      margin-bottom: 40px;
    }
    .intro-text p {
      margin-bottom: 1.2em;
    }
    .intro-text p:last-child {
      text-align: right;
    }
    .cover-box {
      width: 150px;
      height: 100px;
      margin: 0 auto 40px;
      overflow: hidden;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.8),
        0 0 0 1px rgba(255,255,255,0.05);
    }
    .cover-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
      mix-blend-mode: screen;
    }

    /* === 新增：底部联系信息 === */
    .contact {
      text-align: left;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .contact p {
      margin-bottom: 0.2em;
      /* 让邮箱和微信号整行点击时容易被选中 */
      user-select: all;
    }
  </style>
<base target="_blank">
</head>
<body>
  <canvas id="rain"></canvas>
  <a href="index.html" class="back">←</a>

  <div class="content">
    <h1> 关 于 </h1>
    <p class="subtitle">about</p>

    <div class="cover-box">
      <img src="cover-reverse.gif" alt="cover">
    </div>

    <div class="intro-text">
      <p>感谢你的扫码！</p>
      <p>由于挖矿漫画节的契机我在AI的帮助下制作了这个网页，上面两部是近期用电子手绘板完成的作品——《阿米》和《羽毛球》，《公主奇遇记》画于去年，由于构想太过宏大至今没有完成，但也很值得观看，材料是马克笔、纸张。《杂》是挑选了一些以前的作品，也是以手绘居多。<br><br>
      点击返回箭头向下滑动即可浏览。如果有反馈也欢迎和我联系（方式在底部），感谢你的阅读！<<br><br></p>
      <p>--新名字</p>
    </div>

    <!-- 新增联系信息 -->
    <div class="contact">
      <p>Email：llleeii@foxmail.com</p>
      <p>Wechat：quanshenxin_</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d');
    let w, h;
    const drops = [];
    const maxDrops = 80;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Drop {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = Math.random() * (w + 200) - 100;
        this.y = initial ? Math.random() * h : Math.random() * -50;
        this.len = Math.random() * 12 + 6;
        this.speed = Math.random() * 2 + 1.5;
        this.opacity = Math.random() * 0.15 + 0.04;
        this.drift = Math.random() * 0.4 + 0.1;
        this.width = Math.random() * 0.4 + 0.2;
      }
      update() {
        this.y += this.speed;
        this.x += this.drift;
        if (this.y > h + 20) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.drift * 0.5, this.y + this.len);
        ctx.strokeStyle = `rgba(180,195,215,${this.opacity})`;
        ctx.lineWidth = this.width;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    for (let i = 0; i < maxDrops; i++) drops.push(new Drop());

    function animate() {
      ctx.clearRect(0, 0, w, h);
      drops.forEach(d => { d.update(); d.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
