<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新 名 字</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 1rem;
      color: #888;
      margin-bottom: 2rem;
      letter-spacing: 0.2em;
    }
    .enter-btn {
      display: inline-block;
      padding: 16px 50px;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.15em;
      transition: all 0.3s ease;
    }
    .enter-btn:hover {
      background: #fff;
      color: #1a1a1a;
    }
    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Lei's Manga Works</h1>
  <p class="subtitle">from the beginning to 2026</p>
  <a href="catalog.html" class="enter-btn">enter</a>
  <div class="footer">© Lei </div>
</body>
</html>
