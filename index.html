<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lei's Manga Works</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .box {
      position: relative;
      z-index: 1;
      width: 150px;
      height: 100px;
      border: 1px solid #fff;
      overflow: hidden;
      transition: all 0.5s ease;
      cursor: pointer;
    }
    .box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .box:hover {
      box-shadow: 0 0 40px rgba(255,255,255,0.1);
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>
  <a href="catalog.html" class="box">
    <img src="cover.JPG" alt="cover">
  </a>
