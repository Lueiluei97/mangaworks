<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lei's Manga Works</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    /* 首屏封面区域 */
    .hero {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .box {
      position: relative;
      z-index: 1;
      width: 150px;
      height: 100px;
      border: 0px solid rgba(255,255,255,0.15);
      background: transparent;
      overflow: hidden;
      transition: all 0.5s ease;
      cursor: pointer;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.8),
        0 0 0 1px rgba(255,255,255,0.05);
    }
    .box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
      mix-blend-mode: screen;
    }
    .box:hover {
      border-color: rgba(255,255,255,0.3);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.9),
        0 0 0 1px rgba(255,255,255,0.1),
        0 0 40px rgba(255,255,255,0.04);
      transform: translateY(-4px) scale(1.02);
    }
    .box:hover img {
      opacity: 1;
    }

    /* 滚动提示 */
    .scroll-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      animation: breathe 2s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.6; }
    }

    /* 目录瀑布流区域 */
    .catalog-section {
      position: relative;
      z-index: 1;
      padding: 80px 16px 100px;
    }
    .catalog-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
      max-width: 800px;
      margin: 0 auto;
    }
    .catalog-card {
      display: block;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    /* 关键改动：preview-box 样式现在和 .box 完全一致 */
    .preview-box {
      width: 150px;
      height: 100px;
      border: 0px solid rgba(255,255,255,0.15);
      background: transparent;
      overflow: hidden;
      transition: all 0.5s ease;
      cursor: pointer;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.8),
        0 0 0 1px rgba(255,255,255,0.05);
    }
    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
      mix-blend-mode: screen;
    }

    /* hover 效果和 .box:hover 完全一致 */
    .catalog-card:hover .preview-box {
      border-color: rgba(255,255,255,0.3);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.9),
        0 0 0 1px rgba(255,255,255,0.1),
        0 0 40px rgba(255,255,255,0.04);
      transform: translateY(-4px) scale(1.02);
    }
    .catalog-card:hover .preview-box img {
      opacity: 1;
    }

    /* 作品标题 */
    .card-title {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      margin-top: 12px;
      transition: color 0.3s;
    }
    .catalog-card:hover .card-title {
      color: rgba(255,255,255,0.8);
    }

    /* 页脚 */
    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px 60px;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      line-height: 1.8;
      letter-spacing: 0.05em;
    }
    .footer .sign {
      display: block;
      text-align: right;
      max-width: 800px;
      margin: 4px auto 0;
    }
  </style>
<base target="_blank">
</head>
<body>
  <canvas id="rain"></canvas>

  <!-- 首屏封面 -->
  <div class="hero">
    <a href="about.html" class="box">
      <img src="cover.gif" alt="cover">
    </a>
    <div class="scroll-hint">↓ 滑动浏览 ↓</div>
  </div>

  <!-- 目录瀑布流 -->
  <div class="catalog-section">
    <div class="catalog-grid">
      <a href="ami.html" class="catalog-card">
        <div class="preview-box">
          <img src="ami_preview.jpg" alt="阿米">
        </div>
        <p class="card-title"> 阿 米 </p>
      </a>
      <a href="badminton.html" class="catalog-card">
        <div class="preview-box">
          <img src="badminton_preview.png" alt="羽毛球">
        </div>
        <p class="card-title"> 羽 毛 球 </p>
      </a>
      <a href="princess.html" class="catalog-card">
        <div class="preview-box">
          <img src="princess_preview.PNG" alt="公主奇遇记">
        </div>
        <p class="card-title"> 公 主 奇 遇 记 </p>
      </a>
      <a href="misc.html" class="catalog-card">
        <div class="preview-box">
          <img src="misc_preview.JPG" alt="杂">
        </div>
        <p class="card-title"> 杂 多 </p>
      </a>
    </div>
  </div>

  <div class="footer">
    祝阅读愉快！
  </div>

  <script>
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d');
    let width, height;
    const drops = [];
    const maxDrops = 200;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Drop {
      constructor() {
        this.reset(true);
      }
      reset(initial = false) {
        this.x = Math.random() * (width + 200) - 100;
        this.y = initial ? Math.random() * height : Math.random() * -50;
        this.len = Math.random() * 20 + 10;
        this.speed = Math.random() * 4 + 3;
        this.opacity = Math.random() * 0.3 + 0.08;
        this.drift = Math.random() * 0.8 + 0.2;
        this.width = Math.random() * 0.6 + 0.3;
      }
      update() {
        this.y += this.speed;
        this.x += this.drift;
        if (this.y > height + 20) {
          this.reset();
        }
      }
      draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.drift * 0.6, this.y + this.len);
        ctx.strokeStyle = `rgba(180,195,215,${this.opacity})`;
        ctx.lineWidth = this.width;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    for (let i = 0; i < maxDrops; i++) {
      drops.push(new Drop());
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      drops.forEach(drop => {
        drop.update();
        drop.draw();
      });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
