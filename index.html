<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lei's Manga Works</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    .box {
      position: relative;
      z-index: 1;
      width: 150px;
      height: 100px;
      border: 0.0px solid rgba(255,255,255,0.15);
      background: transparent;
      overflow: hidden;
      transition: all 0.5s ease;
      cursor: pointer;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.8),
        0 0 0 1px rgba(255,255,255,0.05);
    }
    .box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
      mix-blend-mode: screen;
    }
    .box:hover {
      border-color: rgba(255,255,255,0.3);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.9),
        0 0 0 1px rgba(255,255,255,0.1),
        0 0 40px rgba(255,255,255,0.04);
      transform: translateY(-4px) scale(1.02);
    }
    .box:hover img {
      opacity: 1;
    }
    .footer {
      position: absolute;
      bottom: 40px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 1;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      line-height: 1.8;
      letter-spacing: 0.05em;
    }
    .footer .sign {
      display: block;
      text-align: right;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>
  <a href="catalog.html" class="box">
    <img src="cover.gif" alt="cover">
  </a>

  <script>
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d');
    let width, height;
    const drops = [];
    const maxDrops = 200;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Drop {
      constructor() {
        this.reset(true);
      }
      reset(initial = false) {
        this.x = Math.random() * (width + 200) - 100;
        this.y = initial ? Math.random() * height : Math.random() * -50;
        this.len = Math.random() * 20 + 10;
        this.speed = Math.random() * 4 + 3;
        this.opacity = Math.random() * 0.3 + 0.08;
        this.drift = Math.random() * 0.8 + 0.2;
        this.width = Math.random() * 0.6 + 0.3;
      }
      update() {
        this.y += this.speed;
        this.x += this.drift;
        if (this.y > height + 20) {
          this.reset();
        }
      }
      draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.drift * 0.6, this.y + this.len);
        ctx.strokeStyle = `rgba(180,195,215,${this.opacity})`;
        ctx.lineWidth = this.width;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    for (let i = 0; i < maxDrops; i++) {
      drops.push(new Drop());
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      drops.forEach(drop => {
        drop.update();
        drop.draw();
      });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
